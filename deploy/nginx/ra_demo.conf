# RADONaix demo UI — served ALONGSIDE the production app, never on top of it.
#
# The production UI owns /var/www/radonaix and deploys with
# `rsync -a --delete`, so anything else placed there is destroyed on the next
# production deploy — and until then, production is replaced by it. This vhost
# therefore uses its own port and its own web root:
#
#   https://<host>/        -> production UI   (/var/www/radonaix)      [untouched]
#   https://<host>:8443/   -> demo UI         (/var/www/ra_demo)
#
# Both proxy /api and /grafana to the SAME backend and Grafana, so the demo
# shows real data. Note the consequence: writes made in the demo (Users, Roles,
# System Config) hit production. Demo with a viewer/analyst account.
#
# A separate port also keeps browser storage separate — localStorage and
# sessionStorage are scoped per origin, and origin includes the port. The demo's
# radonaix_* keys and login session therefore cannot collide with production's.
#
# Install:
#   sudo cp deploy/nginx/ra_demo.conf /etc/nginx/conf.d/
#   sudo mkdir -p /var/www/ra_demo
#   sudo nginx -t && sudo systemctl reload nginx
#   # open 8443 if firewalld is active:
#   sudo firewall-cmd --add-port=8443/tcp --permanent && sudo firewall-cmd --reload

# Reuses the production upstream. If nginx complains that `radonaix_api` is
# already defined, that's the production conf declaring it — delete this block
# and let this vhost use the existing one.
upstream radonaix_demo_api {
    server 127.0.0.1:8000;
}

server {
    listen 8443 ssl http2;
    server_name 10.200.37.142;

    # Same certificate as production — it's the same host.
    ssl_certificate     /etc/nginx/certs/radonaix.crt;
    ssl_certificate_key /etc/nginx/certs/radonaix.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # TanStack Start SPA mode emits "_shell.html" as the app shell, not index.html.
    root /var/www/ra_demo;
    index _shell.html;

    client_max_body_size 10m;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # --- Backend API — same backend as production (no trailing slash on proxy_pass) ---
    location /api/ {
        proxy_pass http://radonaix_demo_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # --- Export downloads (Download Centre) — X-Accel-Redirect target ---
    # Must match the backend's EXPORT_XACCEL_LOCATION and REPORTS_DIR.
    location /_export_files/ {
        internal;
        alias /var/lib/radonaix/reports/;
        sendfile on;
        tcp_nopush on;
        add_header Accept-Ranges bytes;
    }

    # --- Grafana — same instance, same origin so System Monitoring can iframe it ---
    location /grafana/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Grafana Live (websockets)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Allow this origin to iframe Grafana — overrides the server-level DENY for
        # this path only. add_header in a location drops inherited headers, so the
        # ones we still want are re-declared here.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # --- Hashed static assets (Vite build) — cache hard ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- SPA fallback: any other path serves the app shell (client-side routing) ---
    location / {
        try_files $uri $uri/ /_shell.html;
    }
}
